<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- DNA 双螺旋装饰 - 更精致 -->
  <g opacity="0.25">
    <!-- 左侧螺旋 -->
    <path d="M 40 50 Q 30 70 40 90 Q 50 110 40 130 Q 30 150 40 170" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 右侧螺旋 -->
    <path d="M 160 50 Q 170 70 160 90 Q 150 110 160 130 Q 170 150 160 170" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 连接线 -->
    <line x1="40" y1="60" x2="160" y2="60" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="80" x2="160" y2="80" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="100" x2="160" y2="100" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="120" x2="160" y2="120" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="140" x2="160" y2="140" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="160" x2="160" y2="160" stroke="white" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- 中心白色圆形 - 更大更突出 -->
  <circle cx="100" cy="100" r="55" fill="url(#centerGlow)" opacity="0.98"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- BioF3 文字 - 单行显示 -->
  <text x="100" y="110" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="32" 
        font-weight="bold" 
        fill="url(#textGradient)" 
        text-anchor="middle"
        letter-spacing="1">BioF3</text>
  
  <!-- 装饰性小圆点 - 三种颜色 -->
  <g opacity="0.6">
    <!-- 蓝色点 (DDD) -->
    <circle cx="100" cy="30" r="4" fill="#4F46E5"/>
    <circle cx="85" cy="35" r="3" fill="#4F46E5"/>
    <circle cx="115" cy="35" r="3" fill="#4F46E5"/>
    
    <!-- 绿色点 (LLL) -->
    <circle cx="170" cy="100" r="4" fill="#059669"/>
    <circle cx="165" cy="85" r="3" fill="#059669"/>
    <circle cx="165" cy="115" r="3" fill="#059669"/>
    
    <!-- 红色点 (ZZZ) -->
    <circle cx="100" cy="170" r="4" fill="#DC2626"/>
    <circle cx="85" cy="165" r="3" fill="#DC2626"/>
    <circle cx="115" cy="165" r="3" fill="#DC2626"/>
    
    <!-- 左侧点 -->
    <circle cx="30" cy="100" r="4" fill="white"/>
    <circle cx="35" cy="85" r="3" fill="white"/>
    <circle cx="35" cy="115" r="3" fill="white"/>
  </g>
  
  <!-- 外圈装饰 -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  
  <!-- 三角形装饰 - 代表三位成员 -->
  <g opacity="0.15">
    <path d="M 100 25 L 85 45 L 115 45 Z" fill="white"/>
    <path d="M 175 100 L 155 85 L 155 115 Z" fill="white"/>
    <path d="M 100 175 L 85 155 L 115 155 Z" fill="white"/>
  </g>
</svg>
